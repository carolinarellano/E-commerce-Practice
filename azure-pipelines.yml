trigger:
- add-user-and-admin-views

pool:
  vmImage: 'ubuntu-latest'

variables:
  tag: '$(Build.BuildId)'

steps:
- checkout: self

- script: |
    echo "Mostrando estructura del repo:"
    ls -la $(Build.SourcesDirectory)
  displayName: 'Mostrar estructura'

- task: Docker@2
  displayName: Build and Push Docker image
  inputs:
    containerRegistry: 'dockerHubConnection'
    repository: 'yochabelmtz/proyectoiac'
    command: 'buildAndPush'
    dockerfile: 'Dockerfile'
    buildContext: '$(Build.SourcesDirectory)'
    tags: |
      $(tag)
